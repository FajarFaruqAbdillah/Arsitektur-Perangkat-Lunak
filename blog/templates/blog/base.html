{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Blog rangkuman materi Arsitektur Perangkat Lunak dengan pembahasan ringan, step by step, dan referensi kampus UMKT.{% endblock %}">
    <title>{% block title %}Rangkuman Arsitektur Perangkat Lunak{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'blog/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{% url 'blog:home' %}">
            <span class="brand-mark">AP</span>
            <span>Arsitektur Notes</span>
        </a>
        <nav class="nav-links" aria-label="Navigasi utama">
            <a href="{% url 'blog:home' %}#materi">Materi</a>
            <a href="{% url 'blog:home' %}#alur">Alur</a>
            <a href="{% url 'blog:home' %}#topik">Topik</a>
            <a href="{% url 'blog:about_author' %}">Tentang Penulis</a>
            <a class="nav-cta" href="https://www.umkt.ac.id/" target="_blank" rel="noopener">Website UMKT</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
