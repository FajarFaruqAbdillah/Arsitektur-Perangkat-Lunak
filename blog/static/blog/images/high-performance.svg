<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Diagram Arsitektur Kinerja Tinggi</title>
  <desc id="desc">Traffic melewati rate limit, queue, worker, cache, dan database.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#dce6ee" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#0f6d7a"/>
    </marker>
  </defs>
  <rect width="960" height="540" rx="28" fill="#f7f9fb"/>
  <rect width="960" height="540" rx="28" fill="url(#grid)" opacity="0.72"/>
  <text x="72" y="78" fill="#0a4f59" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Pola Arsitektur Kinerja Tinggi</text>
  <text x="72" y="112" fill="#637083" font-family="Segoe UI, Arial, sans-serif" font-size="16">Lonjakan ditahan, diantrekan, lalu diproses sesuai kapasitas.</text>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="70" y="244" width="120" height="64" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="130" y="282" fill="#0a4f59" font-size="16" font-weight="700">Users</text>
    <rect x="236" y="244" width="142" height="64" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="307" y="270" fill="#0a4f59" font-size="15" font-weight="700">Rate Limit</text>
    <text x="307" y="292" fill="#637083" font-size="12">Load Balancer</text>
    <rect x="430" y="244" width="124" height="64" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="492" y="270" fill="#0a4f59" font-size="16" font-weight="700">Queue</text>
    <text x="492" y="292" fill="#637083" font-size="12">backpressure</text>
    <rect x="624" y="178" width="124" height="64" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="686" y="216" fill="#0a4f59" font-size="16" font-weight="700">Workers</text>
    <rect x="624" y="326" width="124" height="64" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="686" y="364" fill="#0a4f59" font-size="16" font-weight="700">Cache</text>
    <rect x="800" y="244" width="100" height="64" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="850" y="282" fill="#0a4f59" font-size="16" font-weight="700">DB</text>
  </g>
  <g stroke="#0f6d7a" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M190 276H236"/>
    <path d="M378 276H430"/>
    <path d="M554 263L624 218"/>
    <path d="M554 290L624 350"/>
    <path d="M748 210C786 220 808 236 826 244"/>
    <path d="M748 358C786 346 808 324 826 308"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="348" y="376" width="254" height="48" rx="24" fill="#dff3f5" stroke="#0f6d7a" stroke-width="2"/>
    <text x="475" y="406" fill="#0a4f59" font-size="15" font-weight="700">graceful degradation</text>
  </g>
</svg>
