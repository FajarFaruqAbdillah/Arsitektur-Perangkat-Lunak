<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Diagram Pengantar Arsitektur</title>
  <desc id="desc">Diagram empat layer arsitektur perangkat lunak yang tersusun rapi.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#dce6ee" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#0f6d7a"/>
    </marker>
  </defs>
  <rect width="960" height="540" rx="28" fill="#f7f9fb"/>
  <rect width="960" height="540" rx="28" fill="url(#grid)" opacity="0.72"/>
  <text x="72" y="78" fill="#0a4f59" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Peta Besar Sistem</text>
  <text x="72" y="112" fill="#637083" font-family="Segoe UI, Arial, sans-serif" font-size="16">Arsitektur memperlihatkan bagian sistem, hubungan, dan alasan desain.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="250" y="152" width="460" height="58" rx="12" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="480" y="188" fill="#0a4f59" font-size="18" font-weight="700" text-anchor="middle">Presentation Layer</text>
    <rect x="250" y="238" width="460" height="58" rx="12" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="480" y="274" fill="#0a4f59" font-size="18" font-weight="700" text-anchor="middle">Application Layer</text>
    <rect x="250" y="324" width="460" height="58" rx="12" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="480" y="360" fill="#0a4f59" font-size="18" font-weight="700" text-anchor="middle">Domain Layer</text>
    <rect x="250" y="410" width="460" height="58" rx="12" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="480" y="446" fill="#0a4f59" font-size="18" font-weight="700" text-anchor="middle">Infrastructure Layer</text>
  </g>
  <path d="M480 210V236M480 296V322M480 382V408" stroke="#0f6d7a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="744" y="184" width="136" height="72" rx="16" fill="#dff3f5" stroke="#0f6d7a" stroke-width="2"/>
    <text x="812" y="214" fill="#0a4f59" font-size="16" font-weight="700" text-anchor="middle">Tujuan</text>
    <text x="812" y="238" fill="#637083" font-size="13" text-anchor="middle">arah sistem</text>
    <rect x="744" y="324" width="136" height="72" rx="16" fill="#dff3f5" stroke="#0f6d7a" stroke-width="2"/>
    <text x="812" y="354" fill="#0a4f59" font-size="16" font-weight="700" text-anchor="middle">Trade-off</text>
    <text x="812" y="378" fill="#637083" font-size="13" text-anchor="middle">alasan desain</text>
  </g>
  <path d="M710 181H744M710 353H744" stroke="#0f6d7a" stroke-width="2" stroke-dasharray="6 8"/>
</svg>
