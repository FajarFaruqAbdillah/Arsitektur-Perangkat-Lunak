<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Diagram Quality Attributes</title>
  <desc id="desc">Diagram atribut kualitas availability, security, performance, dan scalability.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#dce6ee" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="960" height="540" rx="28" fill="#f7f9fb"/>
  <rect width="960" height="540" rx="28" fill="url(#grid)" opacity="0.72"/>
  <text x="72" y="78" fill="#0a4f59" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Quality Attributes</text>
  <text x="72" y="112" fill="#637083" font-family="Segoe UI, Arial, sans-serif" font-size="16">Kualitas sistem dijelaskan lewat skenario, ukuran, dan trade-off.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="104" y="168" width="270" height="92" rx="16" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="134" y="204" fill="#0a4f59" font-size="20" font-weight="700">Availability</text>
    <text x="134" y="232" fill="#637083" font-size="14">tetap melayani saat fault</text>
    <rect x="586" y="168" width="270" height="92" rx="16" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="616" y="204" fill="#0a4f59" font-size="20" font-weight="700">Security</text>
    <text x="616" y="232" fill="#637083" font-size="14">data dan akses terlindungi</text>
    <rect x="104" y="342" width="270" height="92" rx="16" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="134" y="378" fill="#0a4f59" font-size="20" font-weight="700">Performance</text>
    <text x="134" y="406" fill="#637083" font-size="14">respons cepat dan stabil</text>
    <rect x="586" y="342" width="270" height="92" rx="16" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="616" y="378" fill="#0a4f59" font-size="20" font-weight="700">Scalability</text>
    <text x="616" y="406" fill="#637083" font-size="14">kapasitas bisa bertambah</text>
  </g>
  <circle cx="480" cy="300" r="70" fill="#0a4f59"/>
  <text x="480" y="293" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">ATAM</text>
  <text x="480" y="321" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">trade-off</text>
  <g stroke="#0f6d7a" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M374 214C414 226 438 244 452 263"/>
    <path d="M586 214C546 226 522 244 508 263"/>
    <path d="M374 388C414 374 438 356 452 337"/>
    <path d="M586 388C546 374 522 356 508 337"/>
  </g>
</svg>
