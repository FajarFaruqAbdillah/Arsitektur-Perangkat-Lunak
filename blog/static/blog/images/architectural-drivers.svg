<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Diagram Architectural Drivers</title>
  <desc id="desc">Empat driver arsitektur mengarah ke keputusan desain.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#dce6ee" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#0f6d7a"/>
    </marker>
  </defs>
  <rect width="960" height="540" rx="28" fill="#f7f9fb"/>
  <rect width="960" height="540" rx="28" fill="url(#grid)" opacity="0.72"/>
  <text x="72" y="78" fill="#0a4f59" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Architectural Drivers</text>
  <text x="72" y="112" fill="#637083" font-family="Segoe UI, Arial, sans-serif" font-size="16">Driver adalah kompas sebelum memilih pola, teknologi, dan struktur sistem.</text>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <rect x="370" y="214" width="220" height="112" rx="18" fill="#0a4f59"/>
    <text x="480" y="260" fill="#ffffff" font-size="21" font-weight="700">Keputusan</text>
    <text x="480" y="291" fill="#ffffff" font-size="21" font-weight="700">Desain</text>
    <rect x="92" y="164" width="190" height="76" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="187" y="196" fill="#0a4f59" font-size="18" font-weight="700">Bisnis</text>
    <text x="187" y="220" fill="#637083" font-size="13">target dan nilai</text>
    <rect x="678" y="164" width="190" height="76" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="773" y="196" fill="#0a4f59" font-size="18" font-weight="700">Kualitas</text>
    <text x="773" y="220" fill="#637083" font-size="13">cepat, aman, tersedia</text>
    <rect x="92" y="340" width="190" height="76" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="187" y="372" fill="#0a4f59" font-size="18" font-weight="700">Constraint</text>
    <text x="187" y="396" fill="#637083" font-size="13">batasan nyata</text>
    <rect x="678" y="340" width="190" height="76" rx="14" fill="#ffffff" stroke="#0f6d7a" stroke-width="2"/>
    <text x="773" y="372" fill="#0a4f59" font-size="18" font-weight="700">Risiko</text>
    <text x="773" y="396" fill="#637083" font-size="13">hal yang harus dicegah</text>
  </g>
  <g stroke="#0f6d7a" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M282 202L364 244"/>
    <path d="M678 202L596 244"/>
    <path d="M282 378L364 296"/>
    <path d="M678 378L596 296"/>
  </g>
</svg>
